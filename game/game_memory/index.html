<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Запоминалка | Цифровая Экспедиция</title>
    <meta property="og:image" content="http://koditok.ru/im.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #5B42F3;
            --text-dark: #1E293B;
            --card-bg: #FFFFFF;
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #2ecc71;
            --telegram: #0088cc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: transparent;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px 20px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .site-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: -10;
            filter: blur(8px) brightness(0.6);
            pointer-events: none;
            background-image: url('../bg_new.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: scale(1.05);
        }

        .btn-home, .btn-home-gameplay, .btn-close-bg {
            position: fixed;
            top: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            z-index: 20000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            padding: 0;
            margin: 0;
            animation: fadeDown 0.5s ease;
        }
        
        .btn-home, .btn-home-gameplay { left: 20px; }
        .btn-close-bg { right: 20px; }

        .btn-home:hover, .btn-home-gameplay:hover {
            background: rgba(16,185,129,0.3);
            transform: scale(1.1);
        }

        .btn-close-bg:hover {
            background: rgba(239,68,68,0.3);
            transform: scale(1.1);
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .g1-header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .g1-timer-container {
            width: 100%;
            max-width: 500px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .g1-timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #10B981, #34D399);
            transition: width 1s linear, background-color 0.3s;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(16,185,129,0.5);
        }

        .g1-timer-bar.danger {
            background: var(--accent);
        }

        .g1-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 500px;
            width: 100%;
        }

        .g1-card {
            width: calc(25% - 10px);
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, #334155, #1E293B);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s, background 0.3s, box-shadow 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.08);
            animation: cardAppear 0.4s ease backwards;
        }

        .g1-card:nth-child(1) { animation-delay: 0.02s; }
        .g1-card:nth-child(2) { animation-delay: 0.04s; }
        .g1-card:nth-child(3) { animation-delay: 0.06s; }
        .g1-card:nth-child(4) { animation-delay: 0.08s; }
        .g1-card:nth-child(5) { animation-delay: 0.10s; }
        .g1-card:nth-child(6) { animation-delay: 0.12s; }
        .g1-card:nth-child(7) { animation-delay: 0.14s; }
        .g1-card:nth-child(8) { animation-delay: 0.16s; }
        .g1-card:nth-child(9) { animation-delay: 0.18s; }
        .g1-card:nth-child(10) { animation-delay: 0.2s; }
        .g1-card:nth-child(11) { animation-delay: 0.22s; }
        .g1-card:nth-child(12) { animation-delay: 0.24s; }
        .g1-card:nth-child(13) { animation-delay: 0.26s; }
        .g1-card:nth-child(14) { animation-delay: 0.28s; }
        .g1-card:nth-child(15) { animation-delay: 0.3s; }
        .g1-card:nth-child(16) { animation-delay: 0.32s; }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.6) rotateY(90deg); }
            to { opacity: 1; transform: scale(1) rotateY(0); }
        }

        .g1-card:active {
            transform: scale(0.92);
        }

        .g1-card.flipped {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            cursor: default;
            transform: rotateY(180deg) scale(1.05);
            box-shadow: 0 0 20px rgba(59,130,246,0.4);
        }

        .g1-card.matched {
            background: linear-gradient(135deg, #10B981, #059669);
            opacity: 0.85;
            cursor: default;
            box-shadow: 0 0 20px rgba(16,185,129,0.4);
            animation: matchPulse 0.5s ease;
        }

        @keyframes matchPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }

        /* ЕДИНОЕ МОДАЛЬНОЕ ОКНО */
        #modal-game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            padding: 25px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: var(--text-dark);
            position: relative;
            border-top: 5px solid var(--primary-bg);
            border: 1px solid rgba(255,255,255,0.3);
            animation: modalSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 5px;
            color: var(--primary-bg);
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0 20px 0;
            color: #10B981;
            animation: scorePulse 0.5s ease;
        }

        @keyframes scorePulse {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .leaderboard-container {
            text-align: left;
            margin: 20px 0;
            background: linear-gradient(135deg, #F8FAFC, #F1F5F9);
            padding: 15px 20px;
            border-radius: 18px;
            border: 1px solid #E2E8F0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
        }

        .leaderboard-container h4 {
            margin: 0 0 15px 0;
            text-align: center;
            font-size: 1.1rem;
            color: #475569;
        }

        .shop-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .shop-item {
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        .shop-item.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #E2E8F0;
        }

        .shop-item.selected {
            border-color: var(--primary-bg);
            background: white;
            box-shadow: 0 0 0 3px rgba(91, 66, 243, 0.1);
        }

        .shop-item-icon {
            font-size: 24px;
            margin-right: 15px;
        }

        .shop-item-title {
            font-weight: 800;
            font-size: 14px;
            color: #1E293B;
            margin-bottom: 2px;
        }

        .shop-item-cost {
            font-size: 12px;
            font-weight: 700;
            color: #64748B;
        }

        .shop-item.locked .shop-item-cost {
            color: #EF4444;
        }

        .g-achievement {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #10B981, #059669);
            border: 2px solid #34D399;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 40000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .g-achievement.show {
            top: 20px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #E2E8F0;
            font-weight: 700;
            color: #334155;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .leaderboard-item.current {
            color: var(--primary-bg);
            background: rgba(91, 66, 243, 0.1);
            padding: 8px 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .promo-text {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 15px;
            color: #475569;
            font-weight: 600;
            background: rgba(52, 211, 153, 0.1);
            padding: 12px;
            border-radius: 12px;
            border-left: 4px solid #10B981;
            text-align: left;
        }

        .floating-group {
            position: relative;
            margin-bottom: 20px;
        }

        .floating-input {
            width: 100%;
            padding: 20px 15px 10px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: #F8FAFC;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        .floating-input:focus {
            border-color: var(--primary-bg);
            background: #FFF;
            box-shadow: 0 0 0 4px rgba(91, 66, 243, 0.1);
        }

        .floating-label {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #94A3B8;
            font-size: 15px;
            font-weight: 600;
            pointer-events: none;
            transition: 0.2s ease-out;
        }

        .floating-input:focus~.floating-label,
        .floating-input:not(:placeholder-shown)~.floating-label {
            top: 5px;
            font-size: 11px;
            color: var(--primary-bg);
            font-weight: 800;
        }

        #input-playerName {
            text-align: left;
            padding: 20px 15px 10px;
            border: 2px solid #E2E8F0;
            background: #F8FAFC;
            margin-bottom: 0;
            box-shadow: none !important;
        }

        #input-playerName:focus {
            border-color: var(--primary-bg);
            background: #FFF;
        }

        .select-input {
            width: 100%;
            padding: 18px 15px;
            margin-bottom: 20px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: #F8FAFC;
            font-size: 15px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            color: #1E293B;
            transition: 0.3s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%235B42F3%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        .select-input:focus {
            border-color: var(--primary-bg);
            background-color: #FFF;
            box-shadow: 0 0 0 4px rgba(91, 66, 243, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-bg);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(91, 66, 243, 0.3);
            transition: 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(91, 66, 243, 0.4);
        }

        .btn-submit:disabled {
            background: #94A3B8;
            cursor: not-allowed;
        }

        .btn-restart {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #64748B;
            border: 2px solid #E2E8F0;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            transition: 0.2s;
        }

        .btn-restart:hover {
            background: #F1F5F9;
            color: #334155;
        }

        #success-section {
            display: none;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .btn-telegram-large {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            margin: 20px 0;
            transition: 0.3s;
        }

        @media (max-width: 600px) {
            body {
                padding: 70px 10px 10px;
            }

            .btn-home, .btn-home-gameplay, .btn-close-bg {
                width: 40px;
                height: 40px;
                font-size: 20px;
                top: 10px;
            }
            .btn-home, .btn-home-gameplay { left: 10px; }
            .btn-close-bg { right: 10px; }

            .g1-header {
                font-size: 1rem;
                flex-direction: column;
                align-items: center;
                gap: 5px;
                margin-bottom: 10px;
            }

            .g1-card {
                font-size: 1.5rem;
                border-radius: 8px;
            }

            #modal-game-over {
                padding: 10px;
            }

            .modal-content {
                padding: 25px 20px;
                border-radius: 16px;
                width: 100%;
                max-height: 90vh;
                overflow-y: auto;
            }

            .modal-title {
                font-size: 1.5rem;
            }

            .score-display {
                font-size: 1.8rem;
                margin: 5px 0 15px;
            }

            .promo-text {
                font-size: 0.85rem;
                padding: 12px;
                margin-bottom: 15px;
            }

            .floating-input {
                padding: 16px 12px 6px;
                font-size: 14px;
            }

            .floating-label {
                font-size: 13px;
                top: 12px;
            }

            .floating-input:focus~.floating-label,
            .floating-input:not(:placeholder-shown)~.floating-label {
                top: 3px;
                font-size: 10px;
            }

            .select-input {
                padding: 12px;
                font-size: 13px;
                margin-bottom: 15px;
                background-position: right 10px center;
            }

            .btn-submit {
                padding: 14px;
                font-size: 14px;
            }

            .btn-restart {
                padding: 12px;
                font-size: 13px;
                margin-top: 10px;
            }

            #success-section h3 {
                font-size: 1.4rem !important;
            }

            .btn-telegram-large {
                padding: 14px;
                font-size: 13px;
            }

            .success-icon {
                font-size: 3rem;
                margin-bottom: 5px;
            }
        }
    </style>
</head>

<body>

    <!-- ФОН WEB-САЙТА -->
    <div class="site-bg"></div>
    <a href="https://koditok.ru" class="btn-close-bg" title="Перейти на koditok.ru">✖</a>


    <a href="../index.html" class="btn-home-gameplay" title="В хаб">🏠</a>

    <!-- Floating particles canvas -->
    <canvas id="particles-bg" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-5;pointer-events:none;"></canvas>
    <script>
        (function(){
            const pc = document.getElementById('particles-bg');
            const pctx = pc.getContext('2d');
            function resizePC() { pc.width = window.innerWidth; pc.height = window.innerHeight; }
            resizePC(); window.addEventListener('resize', resizePC);
            const dots = [];
            for(let i=0;i<40;i++) dots.push({x:Math.random()*pc.width,y:Math.random()*pc.height,r:Math.random()*3+1,dx:(Math.random()-0.5)*0.5,dy:(Math.random()-0.5)*0.5,a:Math.random()*0.15+0.03});
            function drawP(){
                pctx.clearRect(0,0,pc.width,pc.height);
                dots.forEach(d=>{
                    d.x+=d.dx;d.y+=d.dy;
                    if(d.x<0)d.x=pc.width;if(d.x>pc.width)d.x=0;
                    if(d.y<0)d.y=pc.height;if(d.y>pc.height)d.y=0;
                    pctx.beginPath();pctx.arc(d.x,d.y,d.r,0,Math.PI*2);
                    pctx.fillStyle=`rgba(139,92,246,${d.a})`;
                    pctx.fill();
                });
                requestAnimationFrame(drawP);
            }
            drawP();
        })();

        // Sparkle burst for matched cards
        function createSparkles(el) {
            const rect = el.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            for(let i=0;i<8;i++){
                const s = document.createElement('div');
                const angle = (Math.PI*2/8)*i;
                const dist = 30 + Math.random()*20;
                s.style.cssText = `position:fixed;left:${cx}px;top:${cy}px;width:6px;height:6px;border-radius:50%;background:${['#FBBF24','#10B981','#3B82F6','#EC4899','#A78BFA'][Math.floor(Math.random()*5)]};z-index:9999;pointer-events:none;transition:all 0.6s cubic-bezier(0.16,1,0.3,1);opacity:1;`;
                document.body.appendChild(s);
                requestAnimationFrame(()=>{
                    s.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`;
                    s.style.opacity = '0';
                });
                setTimeout(()=>s.remove(), 700);
            }
        }
    </script>

    <div class="g1-header"
        style="display: flex; align-items: center; gap: 15px; width: 100%; max-width: 500px; margin-bottom: 15px;">
        <div id="g1-player-avatar"
            style="width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; background: var(--primary-bg); box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);">
            🤖</div>
        <div style="flex-grow: 1; display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold;">
            <span id="g1-levelDisplay">Уровень: 1</span>
            <span id="g1-scoreDisplay">Очки: 0</span>
        </div>
    </div>
    <div class="g1-timer-container">
        <div class="g1-timer-bar" id="g1-timerBar"></div>
    </div>
    <div class="g1-grid" id="g1-grid"></div>

    <div class="g-achievement" id="achievement-popup">🏆 <span id="achievement-text">Достижение!</span></div>

    <div id="modal-game-over"
        style="overflow-y: auto; padding: 60px 20px; display: none; align-items: flex-start; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5000;">
        <div class="modal-content" style="margin: auto;">
            <a href="../index.html" class="btn-home" title="В хаб">🏠</a>
            <a href="https://koditok.ru" class="btn-close-bg">✖</a>
            <div id="form-section">
                <div class="modal-title" id="go-title">Время вышло!</div>
                <div class="score-display">Очки: <span id="go-score">0</span></div>
                <div id="go-rank" style="font-size: 1.1rem; font-weight: 800; color: #5B42F3; margin-bottom: 15px;">
                    Загружаем твое место...</div>

                <div class="leaderboard-container">
                    <h4 id="go-leaderboard-title">Топ Игроков: Запоминалка</h4>
                    <div id="go-leaderboard-list"></div>
                </div>

                <div style="margin: 15px 0; text-align:left;">
                    <h4 style="text-align:center; margin-bottom:10px; color:#475569;">🎁 Призы за очки</h4>
                    <div id="go-shop-container" style="display:flex; flex-direction:column; gap:8px;"></div>
                </div>

                <a href="https://forms.amocrm.ru/rczvvlc" target="_blank" class="btn-submit" style="display:block; text-decoration:none; text-align:center;">📝 ЗАПИСАТЬСЯ НА КУРС</a>
                <button class="btn-restart" onclick="restart()">ИГРАТЬ ЗАНОВО</button>
                <button class="btn-restart" onclick="window.location.href='../index.html'">В Главное Меню</button>
            </div>
        </div>
    </div>

    <!-- СТАРТОВОЕ ОКНО -->
    <div id="modal-start"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); z-index: 5000; display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px; overflow-y: auto;">
        <div class="modal-content"
            style="padding: 30px; border-radius: 24px; text-align: center; max-width: 450px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; border-top: 8px solid #5B42F3; margin: auto;">
            <a href="../index.html" class="btn-home" title="В хаб">🏠</a>
            <a href="https://koditok.ru" class="btn-close-bg">✖</a>

            <div style="margin-bottom: 25px;">
                <h2 style="font-size: 1.8rem; color: #1E293B; margin-bottom: 5px;">Добро пожаловать!</h2>
                <p style="color: #64748B;">Настрой своего героя для игры</p>
            </div>

            <div id="setup-hero">
                <div class="floating-group" style="margin-bottom: 20px;">
                    <input type="text" id="input-playerName" class="floating-input" placeholder=" " required>
                    <label class="floating-label">Твое крутое имя</label>
                </div>


                <p style="font-weight: 700; margin-bottom: 10px; color: #1E293B;">Цвет:</p>
                <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
                    <div class="color-btn"
                        style="width:40px; height:40px; border-radius:50%; background:#34D399; cursor:pointer; border:3px solid #1E293B;"
                        onclick="memApp.selectColor('#34D399', '#059669', this)"></div>
                    <div class="color-btn"
                        style="width:40px; height:40px; border-radius:50%; background:#60A5FA; cursor:pointer; border:3px solid transparent;"
                        onclick="memApp.selectColor('#60A5FA', '#2563EB', this)"></div>
                    <div class="color-btn"
                        style="width:40px; height:40px; border-radius:50%; background:#FBBF24; cursor:pointer; border:3px solid transparent;"
                        onclick="memApp.selectColor('#FBBF24', '#D97706', this)"></div>
                    <div class="color-btn"
                        style="width:40px; height:40px; border-radius:50%; background:#EF4444; cursor:pointer; border:3px solid transparent;"
                        onclick="memApp.selectColor('#EF4444', '#B91C1C', this)"></div>
                </div>
                <p style="font-weight: 700; margin-bottom: 10px; color: #1E293B;">Иконка:</p>
                <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
                    <div class="icon-btn"
                        style="font-size: 30px; cursor: pointer; padding: 5px; border-radius: 10px; background: #E2E8F0;"
                        onclick="memApp.selectIcon('💡', this)">💡</div>
                    <div class="icon-btn"
                        style="font-size: 30px; cursor: pointer; padding: 5px; border-radius: 10px; background: transparent;"
                        onclick="memApp.selectIcon('🤖', this)">🤖</div>
                    <div class="icon-btn"
                        style="font-size: 30px; cursor: pointer; padding: 5px; border-radius: 10px; background: transparent;"
                        onclick="memApp.selectIcon('👾', this)">👾</div>
                    <div class="icon-btn"
                        style="font-size: 30px; cursor: pointer; padding: 5px; border-radius: 10px; background: transparent;"
                        onclick="memApp.selectIcon('🎯', this)">🎯</div>
                </div>

                <button class="btn-submit" onclick="memApp.startGame()">ИГРАТЬ</button>
            </div>
        </div>

        <script>
            // ИГРА
            let achievements = JSON.parse(localStorage.getItem('memory_achievements')) || {
                'first_match': false,
                'points_30': false,
                'points_100': false,
                'points_300': false
            };

            function showAchievement(text) {
                const popup = document.getElementById('achievement-popup');
                document.getElementById('achievement-text').innerText = text;
                popup.classList.add('show');
                localStorage.setItem('memory_achievements', JSON.stringify(achievements));
                setTimeout(() => {
                    popup.classList.remove('show');
                }, 3000);
            }

            let level = 1, score = 0, maxTime = 30, timeLeft = 30, timerInterval;
            let lockBoard = false, firstCard = null, secondCard = null, matchesFound = 0, pairsForLevel = 0;
            const symbols = ['★', '✦', '⚙', '⚑', '⚡', '⌨', '✂', '✎', '✆', '✉', '✔', '✘', '♛', '♞', '♻', '∞'];
            const grid = document.getElementById('g1-grid');
            const timerBar = document.getElementById('g1-timerBar');

            function initLevel() {
                grid.innerHTML = ''; matchesFound = 0;[firstCard, secondCard] = [null, null]; lockBoard = false;
                pairsForLevel = Math.min(2 + level, 16);
                if (level > 1) { timeLeft = Math.min(timeLeft + 15, maxTime); updateTimerUI(); }
                document.getElementById('g1-levelDisplay').textContent = `Уровень: ${level}`;
                document.getElementById('g1-scoreDisplay').textContent = `Очки: ${score}`;

                let levelSymbols = symbols.slice(0, pairsForLevel);
                let cardsData = [...levelSymbols, ...levelSymbols].sort(() => 0.5 - Math.random());

                cardsData.forEach(sym => {
                    const card = document.createElement('div'); card.className = 'g1-card';
                    if (pairsForLevel > 8) card.style.width = 'calc(20% - 10px)';
                    if (pairsForLevel > 12) card.style.width = 'calc(16.6% - 10px)';
                    card.dataset.sym = sym;
                    const icon = document.createElement('span'); icon.textContent = sym; icon.style.visibility = 'hidden';
                    card.appendChild(icon);
                    card.onclick = () => flipCard(card, icon);
                    grid.appendChild(card);
                });
                if (level === 1) startTimer();
            }

            function startTimer() {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timeLeft--; updateTimerUI();
                    if (timeLeft <= 0) { clearInterval(timerInterval); showGameOver('Время вышло!'); }
                }, 1000);
            }

            function updateTimerUI() {
                const p = (timeLeft / maxTime) * 100; timerBar.style.width = `${p}%`;
                if (p < 30) timerBar.classList.add('danger'); else timerBar.classList.remove('danger');
            }

            function flipCard(card, icon) {
                if (lockBoard || card === firstCard?.card || card.classList.contains('matched')) return;
                card.classList.add('flipped'); icon.style.visibility = 'visible';
                if (!firstCard) { firstCard = { card, icon }; return; }
                secondCard = { card, icon }; checkMatch();
            }

            function checkMatch() {
                if (firstCard.card.dataset.sym === secondCard.card.dataset.sym) {
                    score += 10 * level; document.getElementById('g1-scoreDisplay').textContent = `Очки: ${score}`;
                    firstCard.card.classList.add('matched'); secondCard.card.classList.add('matched');
                    createSparkles(firstCard.card); createSparkles(secondCard.card);
                    matchesFound++;[firstCard, secondCard] = [null, null];
                    
                    if(!achievements['first_match']) { achievements['first_match'] = true; showAchievement('Отличная память!'); }
                    if(score >= 30 && !achievements['points_30']) { achievements['points_30'] = true; showAchievement('Начинающий (30 очков)'); }
                    if(score >= 100 && !achievements['points_100']) { achievements['points_100'] = true; showAchievement('Охотник (100 очков)'); }
                    if(score >= 300 && !achievements['points_300']) { achievements['points_300'] = true; showAchievement('Амбассадор (300 очков)'); }

                    if (matchesFound === pairsForLevel) { lockBoard = true; setTimeout(() => { level++; initLevel(); }, 800); }
                } else {
                    lockBoard = true;
                    setTimeout(() => {
                        firstCard.card.classList.remove('flipped'); firstCard.icon.style.visibility = 'hidden';
                        secondCard.card.classList.remove('flipped'); secondCard.icon.style.visibility = 'hidden';
                        [firstCard, secondCard] = [null, null]; lockBoard = false;
                    }, 800);
                }
            }

            function restart() {
                level = 1; score = 0; maxTime = 30; timeLeft = 30;
                document.getElementById('modal-game-over').style.display = 'none';
                initLevel();
            }

            // ЛИДЕРБОРДЫ И ФОРМА
            const BIN_ID = '69afbb489ec6934cdd290238';
            const JSONBIN_KEY = '$2a$10$b87y0OSnFsBJqk5N87voBOhYvkQb6VQX8hWHDllf9J65k0.QxHl3i';

            const shopItems = [
                { title: 'Скидка 10% на любой курс', cost: 0, icon: '🎁', gradient: 'linear-gradient(135deg, #10B981, #059669)' },
                { title: 'Скидка 15% на курс Электроники', cost: 100, icon: '🔌', gradient: 'linear-gradient(135deg, #3B82F6, #1D4ED8)' },
                { title: 'Фирменный стикерпак', cost: 300, icon: '🎒', gradient: 'linear-gradient(135deg, #EC4899, #BE185D)' },
                { title: 'Бесплатное занятие', cost: 500, icon: '🎓', gradient: 'linear-gradient(135deg, #F59E0B, #D97706)' }
            ];

            function renderShop() {
                const container = document.getElementById('go-shop-container');
                container.innerHTML = '';
                shopItems.forEach(item => {
                    const unlocked = score >= item.cost;
                    const div = document.createElement('div');
                    div.style.cssText = `display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:2px solid ${unlocked ? '#10B981' : '#E2E8F0'};background:${unlocked ? 'rgba(16,185,129,0.06)' : '#F8FAFC'};opacity:${unlocked ? 1 : 0.5};transition:0.2s;`;
                    div.innerHTML = `<div style="width:42px;height:42px;border-radius:12px;background:${unlocked ? item.gradient : '#CBD5E1'};display:flex;justify-content:center;align-items:center;font-size:22px;box-shadow:0 4px 10px rgba(0,0,0,0.15);">${unlocked ? item.icon : '🔒'}</div><div style="flex:1;"><div style="font-weight:800;font-size:13px;color:#1E293B;">${item.title}</div><div style="font-size:11px;font-weight:700;color:${unlocked ? '#10B981' : '#EF4444'};">${item.cost > 0 ? (unlocked ? '✅ Разблокировано' : `🔒 Нужно ${item.cost} очков`) : '⭐ Бесплатно'}</div></div>`;
                    container.appendChild(div);
                });
            }

            async function getLeaderboard() {
                try {
                    let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                        method: 'GET',
                        headers: { 'X-Master-Key': JSONBIN_KEY }
                    });
                    if (res.ok) {
                        let data = await res.json();
                        let board = Array.isArray(data.record) ? data.record : [];
                        return board.sort((a, b) => b.score - a.score).slice(0, 10);
                    }
                } catch (e) { console.error('Error fetching leaderboard:', e); }

                // Fallback to local
                let board = JSON.parse(localStorage.getItem('koditok_leader_board_game1'));
                if (!board) { board = [{ name: 'Alex_Pro', score: 1540 }, { name: 'DevNinja', score: 820 }, { name: 'Илья_Б', score: 600 }]; }
                return board.sort((a, b) => b.score - a.score).slice(0, 10);
            }

            async function showGameOver(titleText) {
                document.getElementById('go-score').innerText = score;
                document.getElementById('go-title').innerText = titleText;
                document.getElementById('go-leaderboard-list').innerHTML = '<span>Отправка результата...</span>';

                renderShop();
                document.getElementById('modal-game-over').style.display = 'flex';

                const memhero = JSON.parse(localStorage.getItem('memory_hero')) || { color: '#34D399', darkColor: '#059669', icon: '🧠', name: 'Игрок' };
                const finalName = memhero.name || 'Игрок';

                // Auto submit to leaderboard
                (async () => {
                    try {
                        let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { method: 'GET', headers: { 'X-Master-Key': JSONBIN_KEY } });
                        let board = [];
                        if (res.ok) { let data = await res.json(); board = Array.isArray(data.record) ? data.record : []; }

                        const finalName = (memhero.name || 'Игрок').trim();
                        const existingIndex = board.findIndex(e => e.name.toLowerCase() === finalName.toLowerCase());
                        // Update rank display
                        const rank = board.findIndex(e => e.name.toLowerCase() === finalName.toLowerCase()) + 1;
                        document.getElementById('go-rank').innerText = rank > 0 ? `Твое место в мире: ${rank}` : 'Твое место: Загрузка...';
                        if (rank > 10) {
                            document.getElementById('go-rank').style.color = '#EF4444';
                        } else {
                            document.getElementById('go-rank').style.color = '#5B42F3';
                        }
                        if (existingIndex !== -1) {
                            if (score > board[existingIndex].score) {
                                board[existingIndex].score = score;
                                board[existingIndex].date = new Date().toISOString();
                                board[existingIndex].memhero = memhero;
                            }
                        } else {
                            board.push({ name: finalName, score: score, date: new Date().toISOString(), memhero: memhero });
                        }

                        board.sort((a, b) => b.score - a.score);
                        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                            method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY }, body: JSON.stringify(board)
                        });
                        localStorage.setItem('koditok_leader_board_game1', JSON.stringify(board));
                        refreshLeaderboardUI(true);
                    } catch (e) { console.error('Auto leaderboard fail', e); refreshLeaderboardUI(false); }
                })();
            }

            async function refreshLeaderboardUI(success) {
                const list = document.getElementById('go-leaderboard-list');
                const board = await getLeaderboard();
                if (list) {
                    list.innerHTML = '';
                    board.forEach((entry, idx) => {
                        let avatar = '';
                        if (entry.memhero) {
                            const m = entry.memhero;
                            avatar = `<div style="width:30px; height:30px; border-radius:50%; background:${m.color}; border:2px solid ${m.darkColor}; display:inline-flex; justify-content:center; align-items:center; vertical-align:middle; margin-right:10px; font-size:16px;">${m.icon}</div>`;
                        } else {
                            avatar = `<div style="width:30px; height:30px; border-radius:50%; background:#34D399; border:2px solid #059669; display:inline-flex; justify-content:center; align-items:center; vertical-align:middle; margin-right:10px; font-size:16px;">🧠</div>`;
                        }
                        const div = document.createElement('div'); div.className = 'leaderboard-item';
                        div.innerHTML = `<span style="display:flex; align-items:center;">#${idx + 1}&nbsp;&nbsp;${avatar} ${entry.name}</span> <span>${entry.score}</span>`;
                        list.appendChild(div);
                    });
                    const cur = document.createElement('div'); cur.className = 'leaderboard-item current'; cur.innerHTML = `<span>Ваш результат:</span> <span>${score}</span>`; list.appendChild(cur);
                }
            }


            const memApp = {
                color: '#34D399',
                darkColor: '#059669',
                icon: '🧠',
                init() {
                    const saved = JSON.parse(localStorage.getItem('memory_hero'));
                    if (saved) {
                        this.color = saved.color || this.color;
                        this.darkColor = saved.darkColor || this.darkColor;
                        this.icon = saved.icon || this.icon;
                        if (saved.name) document.getElementById('input-playerName').value = saved.name;
                    }

                    // Sync button highlights
                    document.querySelectorAll('.color-btn').forEach(btn => {
                        const btnColor = btn.getAttribute('onclick').match(/'([^']+)'/)[1];
                        btn.style.borderColor = btnColor === this.color ? '#1E293B' : 'transparent';
                    });
                    document.querySelectorAll('.icon-btn').forEach(btn => {
                        btn.style.background = btn.getAttribute('data-icon') === this.icon ? '#E2E8F0' : 'transparent';
                    });

                    this.updatePreview();
                },
                selectColor(c, dc, el) {
                    this.color = c; this.darkColor = dc;
                    document.querySelectorAll('.color-btn').forEach(b => b.style.borderColor = 'transparent');
                    el.style.borderColor = '#1E293B';
                    this.updatePreview();
                },
                selectIcon(i, el) {
                    this.icon = i;
                    document.querySelectorAll('.icon-btn').forEach(b => b.style.background = 'transparent');
                    el.style.background = '#E2E8F0';
                    this.updatePreview();
                },
                updatePreview() {
                    const p = document.getElementById('avatar-preview');
                    p.style.background = this.color;
                    p.style.borderColor = this.darkColor;
                    p.innerText = this.icon;
                },
                startGame() {
                    const nameInp = document.getElementById('input-playerName');
                    const name = nameInp ? (nameInp.value.trim() || 'Игрок') : 'Игрок';
                    localStorage.setItem('memory_hero', JSON.stringify({ color: this.color, darkColor: this.darkColor, icon: this.icon, name: name }));

                    // Sync to gameplay HUD
                    const avatar = document.getElementById('g1-player-avatar');
                    if (avatar) {
                        avatar.style.background = this.color;
                        avatar.style.borderColor = this.darkColor;
                        avatar.innerText = this.icon;
                    }

                    document.getElementById('modal-start').style.display = 'none';
                    initLevel();
                }
            };

            memApp.init();
        </script>
</body>

</html>
