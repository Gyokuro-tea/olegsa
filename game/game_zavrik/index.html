<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Заврик: Редактор Героя</title>
    <meta property="og:image" content="http://koditok.ru/im.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5B42F3;
            --primary-glow: rgba(91, 66, 243, 0.2);
            --accent: #34D399;
            --bg-dark: #E2E8F0;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --panel-bg: rgba(255, 255, 255, 0.6);
            --panel-border: rgba(91, 66, 243, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --border-radius-lg: 24px;
            --border-radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        #bg-canvas,
        .ambient-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-light {
            background: radial-gradient(circle at 20% 30%, rgba(91, 66, 243, 0.1) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(52, 211, 153, 0.1) 0%, transparent 50%);
        }

        .site-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: -10;
            filter: blur(8px) brightness(0.6);
            pointer-events: none;
            background-image: url('../bg_new.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: scale(1.05);
        }

        #btn-home, .btn-close-bg {
            position: fixed;
            top: 20px;
            width: 48px;
            height: 48px;
            background: #FFFFFF;
            border: none;
            color: #1E293B;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            z-index: 20000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
            padding: 0;
            margin: 0;
        }

        #btn-home { left: 20px; }
        .btn-close-bg { right: 20px; }

        #btn-home:hover, .btn-close-bg:hover {
            background: #FEE2E2;
            color: #EF4444;
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(239, 68, 68, 0.2);
        }

        .studio-wrapper {
            position: relative;
            z-index: 10;
            width: 1100px;
            max-width: 95vw;
            height: 90vh;
            max-height: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(91, 66, 243, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .studio-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #34D399, #5B42F3, #F472B6, #FBBF24);
            background-size: 300% 100%;
            animation: gradientMove 6s linear infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .studio-header {
            padding: 30px 40px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
        }

        .studio-badge {
            display: inline-block;
            background: rgba(91, 66, 243, 0.1);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 12px;
            border: 1px solid rgba(91, 66, 243, 0.2);
        }

        .studio-title {
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .studio-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
        }

        .studio-content {
            display: flex;
            flex: 1;
            padding: 0 40px 30px;
            gap: 40px;
            position: relative;
            z-index: 2;
            min-height: 0;
        }

        .render-zone {
            flex: 1.2;
            position: relative;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.8) 0%, rgba(241, 245, 249, 0.4) 100%);
            border-radius: var(--border-radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.03);
        }

        #zavrikCanvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.15));
            transition: filter 0.3s;
        }

        .control-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .control-group {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            transition: 0.3s;
        }

        .control-group:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(91, 66, 243, 0.3);
            transform: translateX(5px);
            box-shadow: 0 10px 25px rgba(91, 66, 243, 0.08);
        }

        .control-group h3 {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 800;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .color-btn {
            aspect-ratio: 1;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.4s;
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.6), 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .color-btn:hover {
            transform: translateY(-4px) scale(1.05);
        }

        .color-btn.active {
            border-color: var(--text-main);
            transform: scale(1.15) translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2), inset 0 2px 5px rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        .emotion-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .emotion-btn {
            background: #FFFFFF;
            border: 1px solid var(--panel-border);
            border-radius: var(--border-radius-sm);
            padding: 12px 5px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .emotion-btn span {
            font-size: 22px;
            transition: transform 0.3s;
        }

        .emotion-btn:hover {
            color: var(--text-main);
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(91, 66, 243, 0.1);
        }

        .emotion-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #FFFFFF;
            box-shadow: 0 8px 20px var(--primary-glow);
            transform: translateY(-4px);
        }

        .action-zone {
            background: rgba(248, 250, 252, 0.8);
            border-top: 1px solid var(--panel-border);
            padding: 25px 40px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-group {
            flex: 2;
            position: relative;
        }

        .name-input {
            width: 100%;
            background: #FFFFFF;
            border: 2px solid var(--panel-border);
            border-radius: 16px;
            padding: 24px 30px;
            color: var(--text-main);
            font-size: 20px;
            font-weight: 800;
            outline: none;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.02);
            text-align: center;
        }

        .name-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(91, 66, 243, 0.1), inset 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .start-btn {
            flex: 1.2;
            background: linear-gradient(135deg, var(--accent), #059669);
            color: #FFFFFF;
            border: none;
            border-radius: 16px;
            padding: 24px 40px;
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 25px rgba(52, 211, 153, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(52, 211, 153, 0.5);
        }

        @media (max-width: 900px) {
            .studio-wrapper {
                height: 95vh;
                max-height: none;
            }

            .studio-content {
                flex-direction: column;
                overflow-y: auto;
                padding: 0 20px 20px;
            }

            .render-zone {
                min-height: 350px;
                flex: none;
            }

            .action-zone {
                flex-direction: column;
                padding: 20px;
            }

            .input-group,
            .start-btn {
                width: 100%;
                flex: none;
            }
        }

        @media (max-width: 600px) {
            #btn-home, .btn-close-bg {
                width: 40px;
                height: 40px;
                font-size: 20px;
                top: 10px;
            }
            #btn-home { left: 10px; }
            .btn-close-bg { right: 10px; }

            .studio-wrapper {
                border-radius: 0;
                border: none;
                height: 100vh;
                width: 100vw;
                max-width: 100vw;
                overflow-y: auto;
                padding-bottom: 90px;
            }

            .studio-header {
                padding: 40px 15px 5px;
                text-align: left;
            }

            .studio-title {
                font-size: 1.5rem;
                margin-top: 5px;
            }

            .studio-subtitle {
                font-size: 0.85rem;
                max-width: 65%;
            }

            .studio-badge {
                margin-bottom: 5px;
            }

            .render-zone {
                position: fixed;
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                width: 90px;
                height: 90px;
                min-height: unset;
                border-radius: 50%;
                z-index: 50;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
                border: 2px solid white;
                pointer-events: none;
            }

            .studio-content {
                padding: 5px 15px;
                flex-direction: column;
                overflow: visible;
                height: auto;
            }

            .control-zone {
                padding-right: 0;
                gap: 10px;
            }

            .control-group {
                padding: 12px;
            }

            .color-grid {
                gap: 6px;
            }

            .emotion-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
            }

            .emotion-btn {
                font-size: 9px;
                padding: 6px 2px;
            }

            .action-zone {
                position: static;
                width: 100%;
                background: white;
                padding: 15px;
                flex-direction: column;
                gap: 10px;
                box-shadow: none;
                border-top: none;
                margin-top: 20px;
                border-radius: 20px;
            }

            .name-input {
                padding: 15px 20px;
                font-size: 16px;
                margin-bottom: 0;
                text-align: center;
            }

            .start-btn {
                padding: 15px 20px;
                font-size: 16px;
            }

            .input-group {
                flex: 1.5;
            }

            .start-btn {
                flex: 1;
            }
        }
    </style>
</head>

<body>
    <div class="site-bg"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient-light"></div>

    <a href="../index.html" id="btn-home" class="btn-home" title="В хаб">🏠</a>
    <a href="https://koditok.ru" class="btn-close-bg" title="Перейти на koditok.ru">✖</a>

    <div class="studio-wrapper">
        <header class="studio-header">
            <div class="studio-badge">Лаборатория Учи.ру</div>
            <h1 class="studio-title">Создайте IT-Заврика</h1>
            <p class="studio-subtitle">Настройте нано-броню и эмоциональный модуль</p>
        </header>

        <div class="studio-content">
            <div class="render-zone">
                <canvas id="zavrikCanvas" width="800" height="800"></canvas>
            </div>

            <div class="control-zone">
                <div class="control-group">
                    <h3>🎨 Нано-Покрытие брони</h3>
                    <div class="color-grid">
                        <div class="color-btn active" style="background: #34D399" data-color="#34D399"
                            data-dark="#059669"></div>
                        <div class="color-btn" style="background: #60A5FA" data-color="#60A5FA" data-dark="#2563EB">
                        </div>
                        <div class="color-btn" style="background: #A78BFA" data-color="#A78BFA" data-dark="#7C3AED">
                        </div>
                        <div class="color-btn" style="background: #FBBF24" data-color="#FBBF24" data-dark="#D97706">
                        </div>
                        <div class="color-btn" style="background: #EF4444" data-color="#EF4444" data-dark="#B91C1C">
                        </div>
                        <div class="color-btn" style="background: #F472B6" data-color="#F472B6" data-dark="#DB2777">
                        </div>
                        <div class="color-btn" style="background: #F97316" data-color="#F97316" data-dark="#C2410C">
                        </div>
                        <div class="color-btn" style="background: #06B6D4" data-color="#06B6D4" data-dark="#0E7490">
                        </div>
                        <div class="color-btn" style="background: #84CC16" data-color="#84CC16" data-dark="#4D7C0F">
                        </div>
                        <div class="color-btn" style="background: #1E293B" data-color="#334155" data-dark="#0F172A">
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <h3>🎭 Модуль ИИ-эмоций</h3>
                    <div class="emotion-grid">
                        <div class="emotion-btn active" data-eye="normal"><span>😊</span>Милый</div>
                        <div class="emotion-btn" data-eye="cool"><span>😎</span>Крутой</div>
                        <div class="emotion-btn" data-eye="hacker"><span>🤖</span>Хакер</div>
                        <div class="emotion-btn" data-eye="angry"><span>😠</span>Злой</div>
                        <div class="emotion-btn" data-eye="sleepy"><span>😴</span>Сонный</div>
                        <div class="emotion-btn" data-eye="surprised"><span>😲</span>В шоке</div>
                        <div class="emotion-btn" data-eye="love"><span>😍</span>Любовь</div>
                        <div class="emotion-btn" data-eye="genius"><span>🤓</span>Гений</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-zone">
            <div class="input-group">
                <input type="text" id="playerName" class="name-input" placeholder="Введите имя вашего героя..."
                    autocomplete="off" maxlength="15">
            </div>
            <button class="start-btn" id="btnStart" onclick="initiateLaunch()">Активировать</button>
        </div>
    </div>

    <script>
        // --- Настройка фоновых частиц ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let bgWidth, bgHeight; const stars = [];
        function initBg() {
            bgWidth = window.innerWidth; bgHeight = window.innerHeight;
            bgCanvas.width = bgWidth; bgCanvas.height = bgHeight;
            for (let i = 0; i < 80; i++) stars.push({ x: Math.random() * bgWidth, y: Math.random() * bgHeight, radius: Math.random() * 3 + 1, speed: Math.random() * 0.5 + 0.1, alpha: Math.random() });
        }
        initBg(); window.addEventListener('resize', initBg);

        function drawBg() {
            bgCtx.clearRect(0, 0, bgWidth, bgHeight);
            bgCtx.fillStyle = 'rgba(91, 66, 243, 0.2)';
            stars.forEach(s => {
                s.y -= s.speed; if (s.y < 0) s.y = bgHeight;
                bgCtx.globalAlpha = Math.abs(Math.sin(s.alpha += 0.03));
                bgCtx.beginPath(); bgCtx.arc(s.x, s.y, s.radius, 0, Math.PI * 2); bgCtx.fill();
            });
            bgCtx.globalAlpha = 1; requestAnimationFrame(drawBg);
        }
        drawBg();

        // --- Главный движок Заврика ---
        const canvas = document.getElementById('zavrikCanvas');
        const ctx = canvas.getContext('2d');
        let time = 0, blinkTimer = 0, isBlinking = false, particles = [];
        const state = { color: '#34D399', darkColor: '#059669', eyes: 'normal' };

        // --- Initialize Hero Selection ---
        function initHeroSelection() {
            const saved = JSON.parse(localStorage.getItem('zavrik_hero'));
            if (saved) {
                state.color = saved.color || state.color;
                state.darkColor = saved.dark || state.darkColor;
                state.eyes = saved.eyes || state.eyes;
                const nameInp = document.getElementById('playerName');
                if (nameInp && saved.name) nameInp.value = saved.name;
            }

            // Sync color buttons
            document.querySelectorAll('.color-btn').forEach(btn => {
                if (btn.getAttribute('data-color') === state.color) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Sync eye buttons
            document.querySelectorAll('.emotion-btn').forEach(btn => {
                if (btn.getAttribute('data-eye') === state.eyes) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        initHeroSelection();

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                const target = e.target.closest('.color-btn'); target.classList.add('active');
                state.color = target.getAttribute('data-color');
                state.darkColor = target.getAttribute('data-dark');
                canvas.style.transform = 'scale(0.95)';
                setTimeout(() => { canvas.style.transform = 'scale(1)'; }, 150);
            });
        });

        document.querySelectorAll('.emotion-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
                const target = e.target.closest('.emotion-btn'); target.classList.add('active');
                state.eyes = target.getAttribute('data-eye'); particles = []; time += Math.PI;
            });
        });

        function renderZavrik() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            time += 0.04; blinkTimer++;
            if (blinkTimer > 180 + Math.random() * 100) { isBlinking = true; blinkTimer = 0; }
            if (isBlinking && blinkTimer > 8) { isBlinking = false; }

            const breathe = Math.sin(time * 2) * 0.04;
            const hover = Math.sin(time * 1.5) * 12;
            const tailWag = Math.sin(time * 4) * 4;

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2 + 80 + hover); ctx.scale(10, 10);

            // Тень на полу
            ctx.save(); ctx.translate(0, 30 - hover / 10); const shadowScale = Math.max(0.4, 1 - (hover / 60)); ctx.scale(shadowScale, shadowScale * 0.5);
            ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(0,0,0,0.03)'; ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI * 2); ctx.fill(); ctx.restore();

            // Дыхание
            ctx.scale(1 + breathe / 2, 1 - breathe);

            // Тело
            ctx.fillStyle = state.color;
            ctx.beginPath(); ctx.moveTo(-8, 5); ctx.quadraticCurveTo(-22, 10 + tailWag, -28, 6 + tailWag / 2); ctx.lineTo(-8, 15); ctx.fill();
            ctx.beginPath(); ctx.ellipse(0, 5, 13, 17, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(4, -10, 15, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(13, -7, 11, 0, Math.PI * 2); ctx.fill();

            // Внутренние тени и объем
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath(); ctx.ellipse(-2, 12, 10, 8, Math.PI / 6, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(0, -5, 12, Math.PI * 0.5, Math.PI * 1.2); ctx.fill();

            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath(); ctx.ellipse(2, -19, 8, 4, Math.PI / 8, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(15, -13, 4, 2, -Math.PI / 6, 0, Math.PI * 2); ctx.fill();

            // Шипы
            ctx.fillStyle = state.darkColor;
            ctx.beginPath(); ctx.moveTo(-6, -21); ctx.lineTo(-16, -28); ctx.lineTo(-12, -15); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-11, -10); ctx.lineTo(-22, -14); ctx.lineTo(-13, -1); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-11, 3); ctx.lineTo(-20, 4); ctx.lineTo(-10, 10); ctx.fill();

            // Лицо
            drawFace(time, blinkTimer, isBlinking, state.eyes);
            ctx.restore();
            drawParticles();
            requestAnimationFrame(renderZavrik);
        }

        function drawFace(time, blinkTimer, isBlinking, eyes) {
            const ey = -14; const ex = 8;
            if (eyes === 'normal' || eyes === 'love') {
                ctx.fillStyle = 'rgba(244, 114, 182, 0.6)'; ctx.beginPath(); ctx.arc(ex + 4, ey + 6, 3, 0, Math.PI * 2); ctx.fill();
            }

            if (isBlinking && eyes !== 'hacker' && eyes !== 'sleepy') {
                ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 1.2; ctx.beginPath(); ctx.moveTo(ex - 2, ey); ctx.lineTo(ex + 4, ey); ctx.stroke();
                if (eyes === 'genius') { ctx.beginPath(); ctx.moveTo(ex + 10, ey); ctx.lineTo(ex + 14, ey); ctx.stroke(); }
                return;
            }

            switch (eyes) {
                case 'normal':
                    ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(ex, ey, 5.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#1E293B'; ctx.beginPath(); ctx.arc(ex + 1.5, ey, 3, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(14, ey + 4, 3, 0, Math.PI * 0.8); ctx.stroke();
                    break;
                case 'cool':
                    ctx.fillStyle = '#1E293B'; ctx.fillRect(ex - 5, ey - 4, 13, 8);
                    ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 1.2;
                    ctx.beginPath(); ctx.moveTo(ex - 8, ey - 2); ctx.lineTo(ex - 5, ey - 2); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(13, ey + 4); ctx.lineTo(17, ey + 3); ctx.stroke();
                    // Гламурный блик
                    const gX = ex - 1 + Math.sin(time * 4) * 4;
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath(); ctx.moveTo(gX, ey - 4); ctx.lineTo(gX + 3, ey - 4); ctx.lineTo(gX - 1, ey + 4); ctx.lineTo(gX - 4, ey + 4); ctx.fill();
                    break;
                case 'hacker':
                    ctx.fillStyle = '#020617'; ctx.fillRect(ex - 6, ey - 5, 16, 10);
                    ctx.fillStyle = '#10B981'; ctx.fillRect(ex - 5, ey - 4 + Math.abs(Math.sin(time * 6)) * 8, 14, 1);
                    break;
                case 'angry':
                    ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(ex, ey, 5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#1E293B'; ctx.beginPath(); ctx.arc(ex + 1, ey, 2, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(ex - 4, ey - 6); ctx.lineTo(ex + 4, ey - 2); ctx.stroke();
                    if (Math.random() < 0.1) {
                        const hover = Math.sin(time * 1.5) * 12;
                        particles.push({ type: 'steam', x: (canvas.width / 2) + 80, y: (canvas.height / 2) + 80 + hover - 120, life: 1 });
                    }
                    break;
                case 'sleepy':
                    ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(ex, ey, 4, Math.PI * 0.1, Math.PI * 0.9); ctx.stroke();
                    if (Math.random() < 0.05) {
                        const hover = Math.sin(time * 1.5) * 12;
                        particles.push({ type: 'text', text: 'Z', x: (canvas.width / 2) + 50, y: (canvas.height / 2) + 80 + hover - 150, life: 1 });
                    }
                    break;
                case 'surprised':
                    ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(ex, ey, 6.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#1E293B'; ctx.beginPath(); ctx.arc(ex, ey, 1.5, 0, Math.PI * 2); ctx.fill();
                    break;
                case 'love':
                    ctx.fillStyle = '#EF4444';
                    const hScale = 1 + Math.abs(Math.sin(time * 5)) * 0.3;
                    ctx.save(); ctx.translate(ex, ey); ctx.scale(hScale, hScale);
                    ctx.beginPath(); ctx.moveTo(0, 3); ctx.bezierCurveTo(-5, -2, -5, -7, 0, -5); ctx.bezierCurveTo(5, -7, 5, -2, 0, 3); ctx.fill(); ctx.restore();
                    break;
                case 'genius':
                    ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(ex, ey, 5, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath(); ctx.arc(ex + 12, ey, 5, 0, Math.PI * 2); ctx.stroke();
                    if (Math.random() < 0.05) {
                        const hover = Math.sin(time * 1.5) * 12;
                        particles.push({ type: 'text', text: '💡', x: (canvas.width / 2) + 50, y: (canvas.height / 2) + 80 + hover - 180, life: 1 });
                    }
                    break;
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.y -= 2; p.x += Math.sin(p.y / 20) * 3; p.life -= 0.015;
                ctx.globalAlpha = Math.max(0, p.life);
                if (p.type === 'text') { ctx.font = 'bold 30px Arial'; ctx.fillStyle = p.c || '#5B42F3'; ctx.fillText(p.text, p.x, p.y); }
                else if (p.type === 'steam') { ctx.fillStyle = '#CBD5E1'; ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0, 10 * p.life), 0, Math.PI * 2); ctx.fill(); }
                ctx.globalAlpha = 1; if (p.life <= 0) particles.splice(i, 1);
            }
        }
        renderZavrik();

        // Поле ввода и запуск Игры
        function initiateLaunch() {
            const input = document.getElementById('playerName');
            const name = input.value.trim();

            if (!name) {
                input.style.borderColor = '#EF4444';
                setTimeout(() => { input.style.borderColor = ''; }, 500);
                return;
            }

            const appearance = { name: name, color: state.color, dark: state.darkColor, eyes: state.eyes };
            localStorage.setItem('zavrik_hero', JSON.stringify(appearance));

            // Направляем на game.html в этой же директории
            window.location.href = 'game.html';
        }
    </script>
</body>
