<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка | Цифровая Экспедиция</title>
    <meta property="og:image" content="http://koditok.ru/im.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #5B42F3;
            --text-dark: #1E293B;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: transparent;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .site-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: -10;
            filter: blur(8px) brightness(0.6);
            pointer-events: none;
            background-image: url('../bg_new.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: scale(1.05);
        }

        .btn-home,
        .btn-close-bg {
            position: fixed;
            top: 20px;
            width: 48px;
            height: 48px;
            background: #FFFFFF;
            border: none;
            color: #1E293B;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            z-index: 20000;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
            padding: 0;
            margin: 0;
        }

        .btn-home {
            left: 20px;
        }

        .btn-close-bg {
            right: 20px;
        }

        .btn-home:hover {
            background: #F8FAFC;
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-close-bg:hover {
            background: #FEE2E2;
            color: #EF4444;
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(239, 68, 68, 0.2);
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 30px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 90%;
            width: 450px;
            color: var(--text-dark);
            position: relative;
            overflow-y: auto;
            max-height: 90vh;
            border-top: 8px solid var(--primary-bg);
        }

        h1 {
            font-weight: 800;
            margin-bottom: 5px;
            font-size: 2rem;
            color: var(--primary-bg);
        }

        p {
            color: #64748B;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .floating-group {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .floating-input {
            width: 100%;
            padding: 20px 15px 10px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: #F8FAFC;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        .floating-input:focus {
            border-color: var(--primary-bg);
            background: #FFF;
            box-shadow: 0 0 0 4px rgba(91, 66, 243, 0.1);
        }

        .floating-label {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #94A3B8;
            font-size: 15px;
            font-weight: 600;
            pointer-events: none;
            transition: 0.2s ease-out;
        }

        .floating-input:focus~.floating-label,
        .floating-input:not(:placeholder-shown)~.floating-label {
            top: 5px;
            font-size: 11px;
            color: var(--primary-bg);
            font-weight: 800;
        }

        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #1E293B;
            transform: scale(1.1);
        }

        .icon-btn {
            font-size: 30px;
            cursor: pointer;
            padding: 5px;
            border-radius: 10px;
            background: transparent;
            transition: 0.2s;
        }

        .icon-btn.active {
            background: #E2E8F0;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-bg);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(91, 66, 243, 0.3);
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(91, 66, 243, 0.4);
        }


        @media (max-width: 600px) {

            .btn-home,
            .btn-close-bg {
                width: 40px;
                height: 40px;
                font-size: 20px;
                top: 10px;
            }

            .btn-home {
                left: 10px;
            }

            .btn-close-bg {
                right: 10px;
            }

            .screen {
                padding: 30px 20px;
                width: 100%;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="site-bg"></div>
    <a href="https://koditok.ru" class="btn-close-bg" title="Перейти на koditok.ru">✖</a>
    <a href="../index.html" class="btn-home" title="В хаб">🏠</a>

    <div class="screen">
        <h1>Добро пожаловать!</h1>
        <p>Настрой свою змейку для игры</p>

        <div class="floating-group">
            <input type="text" id="input-playerName" class="floating-input" placeholder=" " required>
            <label class="floating-label">Твое крутое имя</label>
        </div>


        <p style="font-weight: 700; margin-bottom: 10px; color: #1E293B;">Цвет змейки:</p>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap;">
            <div class="color-btn active" style="background:#34D399; border:3px solid #1E293B;"
                onclick="setupApp.selectColor('#34D399', this)"></div>
            <div class="color-btn" style="background:#60A5FA;" onclick="setupApp.selectColor('#60A5FA', this)"></div>
            <div class="color-btn" style="background:#FBBF24;" onclick="setupApp.selectColor('#FBBF24', this)"></div>
            <div class="color-btn" style="background:#EF4444;" onclick="setupApp.selectColor('#EF4444', this)"></div>
            <div class="color-btn" style="background:#A78BFA;" onclick="setupApp.selectColor('#A78BFA', this)"></div>
            <div class="color-btn" style="background:#F472B6;" onclick="setupApp.selectColor('#F472B6', this)"></div>
        </div>

        <p style="font-weight: 700; margin-bottom: 10px; color: #1E293B;">Эмоция:</p>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
            <div class="icon-btn active" style="background: #E2E8F0;" onclick="setupApp.selectIcon('🐍', this)">🐍</div>
            <div class="icon-btn" onclick="setupApp.selectIcon('😎', this)">😎</div>
            <div class="icon-btn" onclick="setupApp.selectIcon('😈', this)">😈</div>
            <div class="icon-btn" onclick="setupApp.selectIcon('🐉', this)">🐉</div>
            <div class="icon-btn" onclick="setupApp.selectIcon('👾', this)">👾</div>
        </div>

        <button class="btn-submit" onclick="setupApp.startGame()">ИГРАТЬ</button>
    </div>

    <script>
        const setupApp = {
            config: { name: 'Игрок', color: '#34D399', icon: '🐍' },
            init() {
                const saved = JSON.parse(localStorage.getItem('snake_hero'));
                if (saved) {
                    this.config = saved;
                    document.getElementById('input-playerName').value = saved.name || '';
                    if (saved.color) {
                        const btn = document.querySelector(`.color-btn[style*="${saved.color}"]`);
                        if (btn) this.selectColor(saved.color, btn);
                    }
                    if (saved.icon) {
                        const iconBtn = Array.from(document.querySelectorAll('.icon-btn')).find(b => b.innerText === saved.icon);
                        if (iconBtn) this.selectIcon(saved.icon, iconBtn);
                    }
                }
            },
            selectColor(color, el) {
                this.config.color = color;
                document.querySelectorAll('.color-btn').forEach(b => b.style.border = '3px solid transparent');
                el.style.border = '3px solid #1E293B';
            },
            selectIcon(icon, el) {
                this.config.icon = icon;
                document.querySelectorAll('.icon-btn').forEach(b => b.style.background = 'transparent');
                el.style.background = '#E2E8F0';
            },
            startGame() {
                const name = document.getElementById('input-playerName').value.trim();
                if (!name) return alert('Пожалуйста, введи имя!');
                this.config.name = name;
                localStorage.setItem('snake_hero', JSON.stringify(this.config));
                window.location.href = 'game.html';
            }
        };

        setupApp.init();
    </script>
</body>

</html>
