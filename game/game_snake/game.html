<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка | Цифровая Экспедиция</title>
    <meta property="og:image" content="http://koditok.ru/im.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #5B42F3;
            --text-dark: #1E293B;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Montserrat', sans-serif;
            touch-action: manipulation;
        }

        body {
            background-color: transparent;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .site-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: -10;
            filter: blur(8px) brightness(0.6);
            pointer-events: none;
            background-image: url('../bg_new.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform: scale(1.05);
        }

        .btn-home,
        .btn-close-bg {
            position: fixed;
            top: 20px;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            z-index: 20000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            padding: 0;
            margin: 0;
            animation: fadeDown 0.5s ease;
        }

        .btn-home {
            left: 20px;
        }

        .btn-close-bg {
            right: 20px;
        }

        .btn-home:hover {
            background: rgba(16,185,129,0.3);
            transform: scale(1.1);
        }

        .btn-close-bg:hover {
            background: rgba(239,68,68,0.3);
            transform: scale(1.1);
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .g-hud {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            animation: fadeDown 0.6s ease;
        }

        .g-hud-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            font-size: 1.2rem;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .g-hud-panel:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.3);
        }

        canvas {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(91,66,243,0.15), 0 10px 30px rgba(0, 0, 0, 0.5);
            display: block;
            animation: boardAppear 0.8s ease;
        }

        @keyframes boardAppear {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .ctrl-btn {
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            color: white;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ctrl-btn:active {
            background: rgba(91,66,243,0.4);
            transform: scale(0.92);
            border-color: rgba(91,66,243,0.6);
        }
        
        .controls-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ЕДИНОЕ МОДАЛЬНОЕ ОКНО */
        #modal-game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 30000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: var(--text-dark);
            position: relative;
            overflow-x: hidden;
            margin: auto;
            border: 1px solid rgba(255,255,255,0.3);
            animation: modalSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .shop-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .shop-item {
            background: #F8FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }

        .shop-item.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #E2E8F0;
        }

        .shop-item.selected {
            border-color: var(--primary-bg);
            background: white;
            box-shadow: 0 0 0 3px rgba(91, 66, 243, 0.1);
        }

        .shop-item-icon {
            font-size: 24px;
            margin-right: 15px;
        }

        .shop-item-title {
            font-weight: 800;
            font-size: 14px;
            color: #1E293B;
            margin-bottom: 2px;
        }

        .shop-item-cost {
            font-size: 12px;
            font-weight: 700;
            color: #64748B;
        }

        .shop-item.locked .shop-item-cost {
            color: #EF4444;
        }

        .g-achievement {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #10B981, #059669);
            border: 2px solid #34D399;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.6);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            z-index: 40000;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .g-achievement.show {
            top: 20px;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 5px;
            color: var(--primary-bg);
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 10px 0 20px 0;
            color: #10B981;
            animation: scorePulse 0.5s ease;
        }

        @keyframes scorePulse {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .leaderboard-container {
            text-align: left;
            margin: 20px 0;
            background: linear-gradient(135deg, #F8FAFC, #F1F5F9);
            padding: 15px 20px;
            border-radius: 18px;
            border: 1px solid #E2E8F0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.03);
        }

        .leaderboard-container h4 {
            margin: 0 0 15px 0;
            text-align: center;
            font-size: 1.1rem;
            color: #475569;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 8px;
            border-bottom: 1px solid #E2E8F0;
            font-weight: 700;
            color: #334155;
            font-size: 14px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .leaderboard-item:hover {
            background: rgba(91,66,243,0.05);
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .promo-text {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 15px;
            color: #475569;
            font-weight: 600;
            background: rgba(52, 211, 153, 0.1);
            padding: 12px;
            border-radius: 12px;
            border-left: 4px solid #10B981;
            text-align: left;
        }

        .floating-group {
            position: relative;
            margin-bottom: 20px;
        }

        .floating-input {
            width: 100%;
            padding: 20px 15px 10px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: #F8FAFC;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: 0.3s;
        }

        .floating-input:focus {
            border-color: var(--primary-bg);
            background: #FFF;
            box-shadow: 0 0 0 4px rgba(91, 66, 243, 0.1);
        }

        .floating-label {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #94A3B8;
            font-size: 15px;
            font-weight: 600;
            pointer-events: none;
            transition: 0.2s ease-out;
        }

        .floating-input:focus~.floating-label,
        .floating-input:not(:placeholder-shown)~.floating-label {
            top: 5px;
            font-size: 11px;
            color: var(--primary-bg);
            font-weight: 800;
        }

        .select-input {
            width: 100%;
            padding: 18px 15px;
            margin-bottom: 20px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            background: #F8FAFC;
            font-size: 15px;
            font-weight: 700;
            outline: none;
            cursor: pointer;
            color: #1E293B;
            transition: 0.3s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%235B42F3%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-bg);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(91, 66, 243, 0.3);
            transition: 0.2s;
        }

        .btn-restart {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #64748B;
            border: 2px solid #E2E8F0;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            transition: 0.2s;
        }

        #success-section {
            display: none;
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .btn-telegram-large {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            margin: 20px 0;
        }
        
        #pre-start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 50;
            font-size: 2rem;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-weight: 800;
            text-align: center;
            border: 2px solid var(--primary-bg);
        }

        @media (max-width: 600px) {

            .btn-home,
            .btn-close-bg {
                width: 40px;
                height: 40px;
                font-size: 20px;
                top: 10px;
            }

            .btn-home {
                left: 10px;
            }

            .btn-close-bg {
                right: 10px;
            }

            .g-hud {
                top: 60px;
                font-size: 1rem;
            }

            .g-hud-panel {
                padding: 5px 15px;
            }

            .controls {
                display: flex;
            }
            
            #modal-game-over { padding: 10px; }
            .modal-content { padding: 20px 15px; width: 100%; max-height: 90vh; }
            .modal-title { font-size: 1.5rem; }
            .score-display { font-size: 1.8rem; margin: 5px 0 15px; }
            .floating-input { padding: 16px 12px 6px; font-size: 14px; }
            .select-input { padding: 12px; font-size: 13px; margin-bottom: 15px; }
            .btn-submit { padding: 14px; font-size: 14px; }
        }
    </style>
</head>

<body>
    <div class="site-bg"></div>
    <a href="https://koditok.ru" class="btn-close-bg" title="Перейти на koditok.ru">✖</a>

    <div class="g-hud">
        <a href="../index.html" class="btn-home" title="В хаб">🏠</a>
        <div class="g-hud-panel" style="margin-left:55px;" id="hero-display">🐍 Загрузка</div>
        <div class="g-hud-panel">⭐ <span id="score-display">0</span></div>
    </div>
    
    <div class="g-achievement" id="achievement-popup">🏆 <span id="achievement-text">Достижение!</span></div>

    <div id="pre-start" onclick="snakeGame.init()">НАЖМИ, ЧТОБЫ НАЧАТЬ</div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls" id="controls">
        <div class="ctrl-btn" onclick="snakeGame.setDir(-1, 0)">⬅️</div>
        <div class="controls-col">
            <div class="ctrl-btn" onclick="snakeGame.setDir(0, -1)">⬆️</div>
            <div class="ctrl-btn" onclick="snakeGame.setDir(0, 1)">⬇️</div>
        </div>
        <div class="ctrl-btn" onclick="snakeGame.setDir(1, 0)">➡️</div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="modal-game-over">
        <div class="modal-content">
            <a href="../index.html" class="btn-home" style="top:10px; left:10px;">🏠</a>
            <a href="https://koditok.ru" class="btn-close-bg" style="top:10px; right:10px;">✖</a>
            <div id="form-section">
                <div class="modal-title" id="go-title">Конец Игры!</div>
                <div class="score-display">Очки: <span id="go-score">0</span></div>
                <div id="go-rank" style="font-size: 1.1rem; font-weight: 800; color: #5B42F3; margin-bottom: 15px;">
                    Загружаем место...</div>

                <div class="leaderboard-container">
                    <h4 id="go-leaderboard-title">Топ Игроков: Змейка</h4>
                    <div id="go-leaderboard-list"></div>
                </div>

                <div style="margin: 15px 0; text-align:left;">
                    <h4 style="text-align:center; margin-bottom:10px; color:#475569;">🎁 Призы за очки</h4>
                    <div id="go-shop-container" style="display:flex; flex-direction:column; gap:8px;"></div>
                </div>

                <a href="https://forms.amocrm.ru/rczvvlc" target="_blank" class="btn-submit" style="display:block; text-decoration:none; text-align:center;">📝 ЗАПИСАТЬСЯ НА КУРС</a>
                <button class="btn-restart" onclick="window.location.reload()">ИГРАТЬ ЗАНОВО</button>
                <button class="btn-restart" onclick="window.location.href='../index.html'">В Главное Меню</button>
            </div>
        </div>
    </div>


    <script>
        // Hero setup
        let hero = JSON.parse(localStorage.getItem('snake_hero')) || { name: 'Игрок', color: '#34D399', icon: '🐍' };
        document.getElementById('hero-display').innerHTML = `${hero.icon} ${hero.name}`;

        // Canvas Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let tileCount = 20;
        let gridSize = 20;
        let lastTime = 0;
        let speed = 8; // moves per second
        let score = 0;
        let gameOver = false;

        function resizeCanvas() {
            let size = Math.min(window.innerWidth - 40, window.innerHeight - 250);
            if (size > 600) size = 600;
            if (window.innerWidth <= 600) {
                // leave room for controls at bottom
                size = Math.min(window.innerWidth - 20, window.innerHeight - 300);
            }
            
            // make size divisible by tileCount
            gridSize = Math.floor(size / tileCount);
            size = gridSize * tileCount;
            
            canvas.width = size;
            canvas.height = size;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let headX = 10, headY = 10;
        let xVelocity = 0, yVelocity = 0;
        let nextX = 0, nextY = 0;
        
        let appleX = 5, appleY = 5;
        let pX = 0, pY = 0;
        let parts = [];
        let tailLength = 2;
        let loopId = null;

        let achievements = JSON.parse(localStorage.getItem('snake_achievements')) || {
            'first_apple': false,
            'points_30': false,
            'points_100': false,
            'points_300': false
        };

        function showAchievement(text) {
            const popup = document.getElementById('achievement-popup');
            document.getElementById('achievement-text').innerText = text;
            popup.classList.add('show');
            localStorage.setItem('snake_achievements', JSON.stringify(achievements));
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }

        let currentLevel = 0;
        const levelsData = [
            { bg: 'rgba(15, 23, 42, 0.6)', obs: [] }, // level 0
            { bg: 'rgba(16, 185, 129, 0.3)', obs: [{x:9, y:9}, {x:10, y:9}, {x:9, y:10}, {x:10, y:10}] }, // level 1: center block 2x2
            { bg: 'rgba(239, 68, 68, 0.3)', obs: [
                {x:5, y:5}, {x:5, y:6}, {x:5, y:7},
                {x:14, y:5}, {x:14, y:6}, {x:14, y:7},
                {x:5, y:14}, {x:5, y:13}, {x:5, y:12},
                {x:14, y:14}, {x:14, y:13}, {x:14, y:12}
            ] }, // level 2: 4 corner bars
            { bg: 'rgba(139, 92, 246, 0.3)', obs: [
                {x:4, y:9}, {x:4, y:10}, {x:15, y:9}, {x:15, y:10},
                {x:9, y:4}, {x:10, y:4}, {x:9, y:15}, {x:10, y:15}
            ] }, // level 3
            { bg: 'rgba(245, 158, 11, 0.3)', obs: [
                {x:7, y:7}, {x:8, y:7}, {x:9, y:7}, {x:10, y:7}, {x:11, y:7}, {x:12, y:7},
                {x:7, y:12}, {x:8, y:12}, {x:9, y:12}, {x:10, y:12}, {x:11, y:12}, {x:12, y:12}
            ] } // level 4
        ];

        const snakeGame = {
            init() {
                document.getElementById('pre-start').style.display = 'none';
                this.reset();
                this.setDir(1, 0);
                requestAnimationFrame(this.gameLoop.bind(this));
            },
            reset() {
                headX = 10; headY = 10;
                xVelocity = 0; yVelocity = 0;
                nextX = 0; nextY = 0;
                score = 0;
                tailLength = 2;
                parts = [];
                gameOver = false;
                speed = 8;
                currentLevel = 0;
                canvas.style.backgroundColor = levelsData[0].bg;
                document.getElementById('score-display').innerText = score;
                this.placeApple();
            },
            setDir(x, y) {
                if(xVelocity === -x && x !== 0) return;
                if(yVelocity === -y && y !== 0) return;
                nextX = x;
                nextY = y;
            },
            gameLoop(timestamp) {
                if (gameOver) return;
                requestAnimationFrame(this.gameLoop.bind(this));
                
                if (timestamp - lastTime < 1000 / speed) return;
                lastTime = timestamp;

                this.update();
                this.draw();
            },
            update() {
                xVelocity = nextX;
                yVelocity = nextY;
                
                headX += xVelocity;
                headY += yVelocity;

                // Wrap-around edges
                if (headX < 0) headX = tileCount - 1;
                if (headX >= tileCount) headX = 0;
                if (headY < 0) headY = tileCount - 1;
                if (headY >= tileCount) headY = 0;

                // Check obstacle collisions
                let currentObs = levelsData[currentLevel].obs;
                for (let ob of currentObs) {
                    if (headX === ob.x && headY === ob.y) {
                        gameOver = true;
                        showGameOver('Удар о препятствие!');
                        return;
                    }
                }

                // Apple collision
                if (headX === appleX && headY === appleY) {
                    score += 10;
                    document.getElementById('score-display').innerText = score;
                    tailLength++;
                    this.placeApple();

                    if(score >= 10 && !achievements['first_apple']) {
                        achievements['first_apple'] = true;
                        showAchievement('Первое яблоко!');
                    }
                    if(score >= 30 && !achievements['points_30']) {
                        achievements['points_30'] = true;
                        showAchievement('Начинающий (30 очков)');
                    }
                    if(score >= 100 && !achievements['points_100']) {
                        achievements['points_100'] = true;
                        showAchievement('Охотник (100 очков)');
                    }
                    if(score >= 300 && !achievements['points_300']) {
                        achievements['points_300'] = true;
                        showAchievement('Амбассадор (300 очков)');
                    }


                    if(score % 50 === 0) speed += 1;
                    
                    // Level progression (every 50 points)
                    let newLevel = Math.floor(score / 50);
                    if(newLevel > 4) newLevel = 4; // Max level index 4
                    if(newLevel > currentLevel) {
                        currentLevel = newLevel;
                        canvas.style.backgroundColor = levelsData[currentLevel].bg;
                    }
                }
            },
            draw() {
                // Clear
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Subtle grid
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= tileCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * gridSize, 0);
                    ctx.lineTo(i * gridSize, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * gridSize);
                    ctx.lineTo(canvas.width, i * gridSize);
                    ctx.stroke();
                }

                // Draw obstacles with glow
                let currentObs = levelsData[currentLevel].obs;
                for (let ob of currentObs) {
                    const ox = ob.x * gridSize + gridSize/2;
                    const oy = ob.y * gridSize + gridSize/2;
                    ctx.shadowColor = 'rgba(255,255,255,0.5)';
                    ctx.shadowBlur = 8;
                    const obGrad = ctx.createRadialGradient(ox, oy, 0, ox, oy, gridSize/2);
                    obGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
                    obGrad.addColorStop(1, 'rgba(255,255,255,0.3)');
                    ctx.fillStyle = obGrad;
                    ctx.beginPath();
                    ctx.roundRect(ob.x * gridSize + 2, ob.y * gridSize + 2, gridSize - 4, gridSize - 4, 4);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Apple pulsing glow
                const pulseScale = 1 + Math.sin(Date.now() / 200) * 0.1;
                const ax = appleX * gridSize + gridSize/2;
                const ay = appleY * gridSize + gridSize/2;
                ctx.shadowColor = 'rgba(239,68,68,0.7)';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(ax, ay, gridSize/2.5 * pulseScale, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(239,68,68,0.15)';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.font = `${gridSize - 2}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🍎', ax, ay);

                // Draw snake body with gradient
                const baseColor = hero.color || '#34D399';
                parts.forEach((p, index) => {
                    const ratio = index / Math.max(parts.length - 1, 1);
                    const alpha = 0.4 + ratio * 0.6;
                    const radius = (gridSize - 4) / 2 * (0.7 + ratio * 0.3);
                    const cx = p.x * gridSize + gridSize/2;
                    const cy = p.y * gridSize + gridSize/2;

                    // Glow for last few segments
                    if (ratio > 0.7) {
                        ctx.shadowColor = baseColor;
                        ctx.shadowBlur = 6;
                    }

                    const segGrad = ctx.createRadialGradient(cx - 2, cy - 2, 0, cx, cy, radius);
                    segGrad.addColorStop(0, `rgba(255,255,255,${alpha * 0.3})`);
                    segGrad.addColorStop(1, baseColor);
                    ctx.fillStyle = segGrad;
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.roundRect(p.x * gridSize + (gridSize - radius*2)/2, p.y * gridSize + (gridSize - radius*2)/2, radius*2, radius*2, radius * 0.5);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;

                    if (p.x === headX && p.y === headY && (xVelocity !== 0 || yVelocity !== 0)) {
                        gameOver = true;
                        showGameOver('Сам себя!');
                    }
                });

                parts.push({x: headX, y: headY});
                while (parts.length > tailLength) {
                    parts.shift();
                }

                // Glowing head
                if(!gameOver) {
                    const hx = headX * gridSize + gridSize/2;
                    const hy = headY * gridSize + gridSize/2;
                    ctx.shadowColor = baseColor;
                    ctx.shadowBlur = 12;
                    ctx.font = `${gridSize}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(hero.icon, hx, hy);
                    ctx.shadowBlur = 0;
                }
            },
            placeApple() {
                let valid = false;
                while(!valid) {
                    appleX = Math.floor(Math.random() * tileCount);
                    appleY = Math.floor(Math.random() * tileCount);
                    valid = true;
                    if(appleX === headX && appleY === headY) valid = false;
                    for(let part of parts) {
                        if(part.x === appleX && part.y === appleY) valid = false;
                    }
                    if(valid) {
                        let currentObs = levelsData[currentLevel].obs;
                        for(let ob of currentObs) {
                            if(ob.x === appleX && ob.y === appleY) valid = false;
                        }
                    }
                }
            }
        };

        // Keyboard setup
        document.body.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') snakeGame.setDir(0, -1);
            if (e.key === 'ArrowDown') snakeGame.setDir(0, 1);
            if (e.key === 'ArrowLeft') snakeGame.setDir(-1, 0);
            if (e.key === 'ArrowRight') snakeGame.setDir(1, 0);
        });
        
        // Touch swipe setup
        let touchStartX = 0; let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive:true});
        canvas.addEventListener('touchend', (e) => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive:true});
        
        function handleSwipe(sX, sY, eX, eY) {
            if(gameOver) return;
            let diffX = eX - sX;
            let diffY = eY - sY;
            if(Math.abs(diffX) > Math.abs(diffY)) {
                if(Math.abs(diffX) > 30) {
                    if(diffX > 0) snakeGame.setDir(1,0); else snakeGame.setDir(-1,0);
                }
            } else {
                if(Math.abs(diffY) > 30) {
                    if(diffY > 0) snakeGame.setDir(0,1); else snakeGame.setDir(0,-1);
                }
            }
        }

        // Leaderboard logic
        const BIN_ID = '69b16828aa77b81da9d6d4d3'; // Using new snake bin
        const JSONBIN_KEY = '$2a$10$b87y0OSnFsBJqk5N87voBOhYvkQb6VQX8hWHDllf9J65k0.QxHl3i';

        const shopItems = [
            { title: 'Скидка 10% на любой курс', cost: 0, icon: '🎁', gradient: 'linear-gradient(135deg, #10B981, #059669)' },
            { title: 'Скидка 15% на курс Электроники', cost: 100, icon: '🔌', gradient: 'linear-gradient(135deg, #3B82F6, #1D4ED8)' },
            { title: 'Фирменный стикерпак', cost: 300, icon: '🎒', gradient: 'linear-gradient(135deg, #EC4899, #BE185D)' },
            { title: 'Бесплатное занятие', cost: 500, icon: '🎓', gradient: 'linear-gradient(135deg, #F59E0B, #D97706)' }
        ];

        function renderShop() {
            const container = document.getElementById('go-shop-container');
            container.innerHTML = '';
            shopItems.forEach(item => {
                const unlocked = score >= item.cost;
                const div = document.createElement('div');
                div.style.cssText = `display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:2px solid ${unlocked ? '#10B981' : '#E2E8F0'};background:${unlocked ? 'rgba(16,185,129,0.06)' : '#F8FAFC'};opacity:${unlocked ? 1 : 0.5};transition:0.2s;`;
                div.innerHTML = `<div style="width:42px;height:42px;border-radius:12px;background:${unlocked ? item.gradient : '#CBD5E1'};display:flex;justify-content:center;align-items:center;font-size:22px;box-shadow:0 4px 10px rgba(0,0,0,0.15);">${unlocked ? item.icon : '🔒'}</div><div style="flex:1;"><div style="font-weight:800;font-size:13px;color:#1E293B;">${item.title}</div><div style="font-size:11px;font-weight:700;color:${unlocked ? '#10B981' : '#EF4444'};">${item.cost > 0 ? (unlocked ? '✅ Разблокировано' : `🔒 Нужно ${item.cost} очков`) : '⭐ Бесплатно'}</div></div>`;
                container.appendChild(div);
            });
        }

        async function showGameOver(titleText) {
            document.getElementById('go-score').innerText = score;
            document.getElementById('go-title').innerText = titleText;
            document.getElementById('go-leaderboard-list').innerHTML = '<span>Отправка результата...</span>';

            renderShop();
            document.getElementById('modal-game-over').style.display = 'flex';

            const finalName = hero.name || 'Игрок';

            let board = JSON.parse(localStorage.getItem('koditok_leader_board_snake'));
            if (!board) {
                board = [{ name: 'Sss_Pro', score: 320, icon: '🐍' }, { name: 'DevNinja', score: 180, icon: '😎' }];
            }

            try {
                let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { method: 'GET', headers: { 'X-Master-Key': JSONBIN_KEY } });
                if (res.ok) { let data = await res.json(); board = Array.isArray(data.record) ? data.record : board; }
                
                const existingIndex = board.findIndex(e => e.name.toLowerCase() === finalName.toLowerCase());
                if (existingIndex !== -1) {
                    if (score > board[existingIndex].score) {
                        board[existingIndex].score = score;
                        board[existingIndex].icon = hero.icon;
                    }
                } else {
                    board.push({ name: finalName, score: score, icon: hero.icon });
                }

                board.sort((a, b) => b.score - a.score);
                
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
                    body: JSON.stringify(board)
                });
            } catch (e) {
                console.error(e);
                const existingIndex = board.findIndex(e => e.name.toLowerCase() === finalName.toLowerCase());
                if (existingIndex !== -1) { if (score > board[existingIndex].score) board[existingIndex].score = score; } else board.push({ name: finalName, score: score, icon: hero.icon });
                board.sort((a, b) => b.score - a.score);
                localStorage.setItem('koditok_leader_board_snake', JSON.stringify(board));
            }

            const rank = board.findIndex(e => e.name.toLowerCase() === finalName.toLowerCase()) + 1;
            document.getElementById('go-rank').innerText = rank > 0 ? `Твое место в топе: ${rank}` : '';
            
            let listHtml = '';
            board.slice(0, 5).forEach((item, index) => {
                const isCurrent = item.name.toLowerCase() === finalName.toLowerCase();
                listHtml += `
                    <div class="leaderboard-item ${isCurrent ? 'current' : ''}">
                        <span>${index + 1}. ${item.icon || '🐍'} ${item.name}</span>
                        <span>${item.score}</span>
                    </div>
                `;
            });
            document.getElementById('go-leaderboard-list').innerHTML = listHtml;
        }

    </script>
</body>
</html>
